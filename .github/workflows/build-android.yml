name: Build Android APK & AAB

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate debug keystore for signing
        run: |
          keytool -genkeypair \
            -alias debug \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore android/app/debug.keystore \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=Debug, OU=Debug, O=FahedNet, L=Aden, ST=Aden, C=YE"

      - name: Inject signing config into build.gradle
        run: |
          cat >> android/app/build.gradle << 'EOF'

          android.signingConfigs.debug {
              storeFile file('debug.keystore')
              storePassword 'android123'
              keyAlias 'debug'
              keyPassword 'android123'
          }
          android.buildTypes.debug.signingConfig android.signingConfigs.debug
          android.buildTypes.release.signingConfig android.signingConfigs.debug
          EOF

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Build Release AAB
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
